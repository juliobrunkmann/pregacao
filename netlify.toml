# =====================================================================
# netlify.toml — configuração do Gerador de Pregações
# =====================================================================

[build]
  # Publica a raiz do projeto (index.html + kenyon-context.js)
  publish = "."
  # Diretório das Netlify Functions
  functions = "netlify/functions"

[functions]
  # Empacotador das functions
  node_bundler = "esbuild"

# As rotas /api/gerar-iniciar, /api/gerar-status e /api/historico são
# definidas por "export const config = { path: ... }" dentro de cada
# function (v2), então não é preciso configurar redirects aqui.
#
# /api/gerar-iniciar (netlify/functions/gerar-iniciar.js) é uma
# BACKGROUND FUNCTION (config.background = true): responde 202 na hora
# e continua rodando no servidor por até 15 min, independente do
# navegador continuar conectado. Isso resolve dois problemas:
#   1. Pregações longas que demoram mais que os 60s do limite síncrono
#      normal pra terminar de ser geradas.
#   2. No celular, trocar de app / apagar a tela derrubava a conexão de
#      streaming e a geração parava no meio sem erro nenhum — agora ela
#      continua no servidor de qualquer forma, e salva sozinha no
#      histórico quando termina.
# /api/gerar-status (netlify/functions/gerar-status.js) é uma function
# normal rápida, só lê o progresso do job no Blobs (store
# "pregacoes-jobs") pra quem estiver acompanhando via polling.
# /api/historico continua como function normal (usa @netlify/blobs,
# store "pregacoes").
